<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 48" fill="none">
  <!-- Logomark: 3 stacked isometric layers -->
  <g transform="translate(4, 4)">
    <!-- Bottom layer -->
    <polygon points="18,34 0,28 18,22 36,28" fill="#1a1a1a" opacity="0.15"/>
    <!-- Middle layer -->
    <polygon points="18,26 0,20 18,14 36,20" fill="#1a1a1a" opacity="0.35"/>
    <!-- Top layer -->
    <polygon points="18,18 0,12 18,6 36,12" fill="#1a1a1a" opacity="0.7"/>
    <!-- Top face highlight on top layer -->
    <polygon points="18,6 36,12 18,18 0,12" fill="none" stroke="#1a1a1a" stroke-width="1.2" opacity="0.9"/>
  </g>
  <!-- Wordmark -->
  <text x="52" y="33" font-family="Inter, -apple-system, sans-serif" font-weight="600" font-size="24" letter-spacing="-0.02em" fill="#1a1a1a">Physic<tspan font-weight="300">AI</tspan></text>
</svg>
